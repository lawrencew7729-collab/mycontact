<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawrence Wong - Digital Profile</title>
    <!-- 必要的 CDN 庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        .handwritten { font-family: 'Great Vibes', cursive; }
        .scale-up-center { animation: scale-up-center 0.3s cubic-bezier(0.39, 0.575, 0.565, 1) both; }
        @keyframes scale-up-center { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 圖標組件 (兼容 CDN)
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const lang = 'en';
            const [showQr, setShowQr] = useState(false);
            const [activeId, setActiveId] = useState('mygreenplus');

            const brandData = {
                hma: {
                    name: "HMA DIGITAL",
                    logo: "https://imgur.com/46sIs1o.png",
                    url: "https://www.hmadigital.asia",
                    theme: "blue",
                    content: { en: "Creative digital agency for\ngrowth, transformation, and\npremium brand elevation." }
                },
                mygreenplus: {
                    name: "MYGREENPLUS",
                    logo: "https://imgur.com/EFoStmS.png",
                    url: "https://www.mygreenplus.com",
                    theme: "emerald",
                    content: { en: "Leading the way in sustainable green solutions and environmental innovation for modern enterprises." }
                },
                nazfam: {
                    name: "NAZFAM Toilet Cubicle System",
                    logo: null,
                    url: "https://nazfam.vercel.app/",
                    theme: "slate",
                    content: { en: "A leading & experienced company of Toilet Cubicle System for public lavatory." }
                }
            };

            const t = { save: "Save Contact", scan: "Share Card", visit: "Click to view website", founder: "THE FOUNDER OF...", qr_title: "Scan to View Profile", qr_desc: "Open this page on another device" };

            const handleSaveContact = () => {
                const vcard = ['BEGIN:VCARD','VERSION:3.0','N:Wong;Lawrence;;;','FN:Lawrence Wong','ORG:Mygreenplus;Hma digital;Nazfam','TITLE:Founder','TEL;TYPE=CELL,VOICE:+60165506664','EMAIL;TYPE=PREF,INTERNET:lawrencew7729@gmail.com','URL:http://www.mygreenplus.com','END:VCARD'].join('\n');
                const blob = new Blob([vcard], { type: 'text/vcard' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.setAttribute('download', 'Lawrence_Wong.vcf'); link.click();
            };

            const getCircleStyle = (id) => {
                const order = ['hma', 'mygreenplus', 'nazfam'];
                const activeIdx = order.indexOf(activeId);
                const currentIdx = order.indexOf(id);
                let diff = currentIdx - activeIdx;
                if (diff === 2) diff = -1; if (diff === -2) diff = 1;
                const baseSize = '140px';
                return {
                    transform: `translateX(${diff * 95}px) scale(1)`,
                    zIndex: diff === 0 ? 30 : 10,
                    opacity: diff === 0 ? 1 : 0.4,
                    width: baseSize, height: baseSize,
                    boxShadow: diff === 0 ? '0 15px 30px -10px rgba(0, 0, 0, 0.12)' : 'none',
                    position: 'absolute'
                };
            };

            return (
                <div className="flex items-center justify-center min-h-screen">
                    <div className="w-full max-w-[450px] aspect-[9/16] bg-white shadow-2xl relative overflow-hidden flex flex-col sm:rounded-[40px] h-[100vh] sm:h-auto">
                        
                        {/* 頂部個人資料與按鈕區 */}
                        <div className="p-8 pt-6 flex justify-between items-start">
                            <div className="flex flex-col">
                                <div className="w-24 h-24 rounded-full border-4 border-white shadow-xl overflow-hidden ring-4 ring-emerald-50 bg-slate-50">
                                    <img src="https://imgur.com/aphxkgy.png" alt="Lawrence Wong" className="w-full h-full object-cover" />
                                </div>
                                <div className="mt-1">
                                    <span className="handwritten text-4xl text-slate-800 leading-none">Lawrence Wong</span>
                                </div>
                            </div>
                            
                            <div className="flex flex-col gap-2 w-32">
                                <a href="https://wa.me/60165506664" className="flex items-center justify-center gap-2 bg-emerald-500 text-white py-2 rounded-xl text-[10px] font-black shadow-md active:scale-95 transition-all"><Icon name="message-circle" size={14}/> WhatsApp</a>
                                <a href="mailto:lawrencew7729@gmail.com" className="flex items-center justify-center gap-2 bg-blue-500 text-white py-2 rounded-xl text-[10px] font-black shadow-md active:scale-95 transition-all"><Icon name="mail" size={14}/> Email</a>
                                <button onClick={handleSaveContact} className="flex items-center justify-center gap-2 bg-slate-800 text-white py-2 rounded-xl text-[10px] font-black shadow-md active:scale-95 transition-all"><Icon name="user-plus" size={14}/> {t.save}</button>
                                <button onClick={() => setShowQr(true)} className="flex items-center justify-center gap-2 bg-slate-100 text-slate-600 py-2 rounded-xl text-[10px] font-black shadow-sm border border-slate-200 active:scale-95 transition-all"><Icon name="qr-code" size={14}/> {t.scan}</button>
                            </div>
                        </div>

                        {/* 中部內容 - 品牌群集 */}
                        <div className="flex-1 flex flex-col items-center px-6 pt-0 mt-4">
                            <p className="text-slate-300 text-[10px] font-black tracking-[0.3em] uppercase mb-2">{t.founder}</p>
                            
                            <div className="relative h-[160px] w-full flex items-center justify-center mb-12">
                                <div onClick={() => setActiveId('hma')} style={getCircleStyle('hma')} className="rounded-[32px] flex items-center justify-center transition-all duration-700 cursor-pointer bg-blue-50 border-4 border-blue-200 overflow-hidden">
                                    <img src="https://imgur.com/46sIs1o.png" className="w-1/2 h-1/2 object-contain" />
                                </div>
                                <div onClick={() => setActiveId('mygreenplus')} style={getCircleStyle('mygreenplus')} className="rounded-[32px] flex items-center justify-center transition-all duration-700 cursor-pointer bg-white border-4 border-emerald-500 overflow-hidden">
                                    <div className="flex flex-col items-center">
                                        <img src="https://imgur.com/EFoStmS.png" className="w-3/5 h-3/5 object-contain" />
                                        <span className="text-[8px] font-black text-emerald-600 tracking-tighter uppercase mt-1">Mygreenplus</span>
                                    </div>
                                </div>
                                <div onClick={() => setActiveId('nazfam')} style={getCircleStyle('nazfam')} className="rounded-[32px] flex items-center justify-center transition-all duration-700 cursor-pointer bg-slate-900 border-4 border-slate-700 overflow-hidden">
                                    <div className="flex items-center gap-2">
                                        <div style={{writingMode: 'vertical-rl'}} className="text-white font-black text-xs">NAZFAM</div>
                                        <div className="flex flex-col justify-center border-l border-slate-700 pl-2">
                                            <div className="text-[7px] text-slate-500 font-bold tracking-widest leading-tight">TOILET</div>
                                            <div className="text-[7px] text-slate-500 font-bold tracking-widest leading-tight">CUBICLE</div>
                                            <div className="text-[7px] text-slate-500 font-bold tracking-widest leading-tight text-emerald-500">SYSTEM</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 描述區 */}
                            <div className="text-center max-w-xs transition-all duration-500 z-20">
                                <p className="text-slate-500 text-[13px] leading-[1.4] font-medium min-h-[60px] px-4 whitespace-pre-line">
                                    {brandData[activeId].content.en}
                                </p>
                                <a href={brandData[activeId].url} target="_blank" className={`inline-flex items-center gap-2 mt-4 text-[10px] font-black px-10 py-3 rounded-2xl text-white shadow-xl active:scale-90 ${brandData[activeId].theme === 'emerald' ? 'bg-emerald-600 shadow-emerald-100' : brandData[activeId].theme === 'blue' ? 'bg-blue-600 shadow-blue-100' : 'bg-slate-800 shadow-slate-100'}`}>
                                    <Icon name="external-link" size={14}/> {t.visit}
                                </a>
                                <div className="flex justify-center gap-2 mt-6">
                                    {['hma', 'mygreenplus', 'nazfam'].map(id => (
                                        <div key={id} className={`h-1.5 rounded-full transition-all duration-500 ${activeId === id ? (id === 'hma' ? 'bg-blue-500 w-10' : id === 'mygreenplus' ? 'bg-emerald-500 w-10' : 'bg-slate-800 w-10') : 'bg-slate-200 w-6'}`} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="h-10 shrink-0"></div>

                        {/* QR 彈窗 */}
                        {showQr && (
                            <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-8" onClick={() => setShowQr(false)}>
                                <div className="bg-white p-8 rounded-[40px] shadow-2xl flex flex-col items-center gap-6 scale-up-center" onClick={e => e.stopPropagation()}>
                                    <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-inner">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.href)}`} alt="QR" className="w-56 h-56" />
                                    </div>
                                    <div className="text-center">
                                        <h3 className="font-black text-xl text-slate-800 tracking-tight">{t.qr_title}</h3>
                                        <p className="text-slate-400 text-xs mt-1 font-medium">{t.qr_desc}</p>
                                    </div>
                                    <button onClick={() => setShowQr(false)} className="w-full py-4 bg-slate-100 rounded-2xl font-black text-slate-500 text-sm active:bg-slate-200">CLOSE</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
